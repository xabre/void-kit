name: Build, Sign & Notarize

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: 'false'
        type: boolean
      version:
        description: 'Version override (e.g. 1.0.0). Takes priority over tag version.'
        required: false
        default: ''
        type: string

env:
  SCHEME: VoidKit
  PROJECT: VoidKit/VoidKit.xcodeproj
  APP_NAME: VoidKit

jobs:
  build:
    name: Build, Sign, Notarize & Package
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set the keychain as the default and add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Using manual version override: $VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Detected version from tag: $VERSION"
          else
            echo "No version set, using project default"
          fi

      - name: Build for Release
        run: |
          VERSION_ARGS=""
          if [ -n "${{ steps.version.outputs.VERSION }}" ]; then
            VERSION_ARGS="MARKETING_VERSION=${{ steps.version.outputs.VERSION }} CURRENT_PROJECT_VERSION=${{ steps.version.outputs.VERSION }}"
          fi

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH --timestamp" \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            $VERSION_ARGS \
            build

      - name: Verify code signature
        run: |
          APP_PATH="build/Build/Products/Release/$APP_NAME.app"
          codesign --verify --deep --strict "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | head -20
          echo "Code signature verified."

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/$APP_NAME.app"
          DMG_PATH="build/$APP_NAME.dmg"
          STAGING_DIR="build/dmg-staging"

          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          # Sign the DMG itself
          codesign --force --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 600 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID and check status
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -m1 'id:' | awk '{print $NF}')
          STATUS=$(echo "$SUBMIT_OUTPUT" | grep -i 'status:' | tail -1 | awk '{print $NF}')

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            echo "Fetching notarization log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "$DMG_PATH"

          echo "Notarization complete and stapled."

      - name: Verify notarization
        run: |
          spctl --assess --type open --context context:primary-signature "$DMG_PATH"
          echo "DMG passes Gatekeeper."

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-dmg
          path: ${{ env.DMG_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME:-manual-$(date +%Y%m%d-%H%M%S)}"
          gh release create "$TAG" \
            "$DMG_PATH" \
            --title "$APP_NAME $TAG" \
            --generate-notes

      - name: Sign DMG with Sparkle EdDSA key
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Resolve Sparkle tools from the SPM build
          SPARKLE_BIN=$(find build -path "*/Sparkle.framework/Versions/B/Resources/bin" -type d 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            echo "Sparkle tools not found in build output, downloading..."
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz" -o /tmp/sparkle.tar.xz
            mkdir -p /tmp/sparkle
            tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
            SPARKLE_BIN="/tmp/sparkle/bin"
          fi

          # Sign the DMG and capture the EdDSA signature
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | "$SPARKLE_BIN/sign_update" "$DMG_PATH" --ed-key-file -)
          echo "SPARKLE_SIGNATURE<<EOF" >> $GITHUB_ENV
          echo "$SIGNATURE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          echo "DMG_SIZE=$DMG_SIZE" >> $GITHUB_ENV

      - name: Update appcast.xml
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${GITHUB_REF_NAME:-v${VERSION}}"
          DOWNLOAD_URL="https://github.com/secelead/void-kit/releases/download/${TAG}/VoidKit.dmg"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          # Extract edDSASignature and length from SPARKLE_SIGNATURE
          ED_SIGNATURE=$(echo "$SPARKLE_SIGNATURE" | grep 'sparkle:edSignature=' | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          ED_LENGTH=$(echo "$SPARKLE_SIGNATURE" | grep 'length=' | sed 's/.*length="\([^"]*\)".*/\1/')

          # If parsing failed, try alternate format
          if [ -z "$ED_SIGNATURE" ]; then
            ED_SIGNATURE="$SPARKLE_SIGNATURE"
            ED_LENGTH="$DMG_SIZE"
          fi

          # Build the new item XML
          ITEM_XML="        <item>
              <title>Version ${VERSION}</title>
              <pubDate>${PUB_DATE}</pubDate>
              <sparkle:version>${VERSION}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
              <enclosure url=\"${DOWNLOAD_URL}\" sparkle:edSignature=\"${ED_SIGNATURE}\" length=\"${ED_LENGTH}\" type=\"application/octet-stream\" />
            </item>"

          # Insert item into appcast.xml (before </channel>)
          if grep -q '</item>' appcast.xml; then
            # Appcast already has items — insert before </channel>
            sed -i '' "s|</channel>|${ITEM_XML}\n  </channel>|" appcast.xml
          else
            # Empty appcast — insert items block
            sed -i '' "s|</channel>|${ITEM_XML}\n  </channel>|" appcast.xml
          fi

      - name: Commit and push updated appcast.xml
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast.xml for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
